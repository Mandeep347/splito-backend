version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: splito_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-splito}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-splito_secret}
      POSTGRES_DB: ${POSTGRES_DB:-splito_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-splito} -d ${POSTGRES_DB:-splito_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: splito_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # api service is run locally with: uvicorn app.main:app --reload
  # Uncomment below only if you want to run everything inside Docker
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: splito_api
  #   env_file:
  #     - .env
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ./app:/app/app
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: