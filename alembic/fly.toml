app = "splito-backend"
primary_region = "sin"  # Singapore — change to "bom" for Mumbai, "lax" for LA

[build]

[env]
  APP_ENV = "production"
  DEBUG = "false"
  APP_NAME = "Splito"
  API_VERSION = "v1"
  ALGORITHM = "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES = "30"
  REFRESH_TOKEN_EXPIRE_DAYS = "7"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1